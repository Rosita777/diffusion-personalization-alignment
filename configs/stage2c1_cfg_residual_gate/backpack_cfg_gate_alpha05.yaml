model_id: data/cache/modelscope/AI-ModelScope/stable-diffusion-v1-5
output_dir: experiments/stage2c1_cfg_residual_gate/backpack
resolution: 512

subjects:
  - subject_id: backpack
    class_name: backpack
    instance_prompt: a photo of sks backpack
    class_prompt: a photo of a backpack
    image_paths:
      - data/cache/off_prior_measurement_v0/dreambooth_dataset/dataset/backpack/00.jpg
      - data/cache/off_prior_measurement_v0/dreambooth_dataset/dataset/backpack/01.jpg
      - data/cache/off_prior_measurement_v0/dreambooth_dataset/dataset/backpack/02.jpg

training:
  condition: dadt_cfg_residual_gate
  max_train_steps: 200
  learning_rate: 0.0001
  lora_rank: 4
  seed: 0
  train_batch_size: 1

alignment:
  alpha: 0.5
  late_timestep_threshold: 800
  low_radius: 2
  mid_radius: 4
  residual_gate_quantile: 0.75
  residual_gate_keep: 0.5

evaluation:
  num_images_per_prompt: 2
  prompts:
    - a photo of sks backpack on a wooden table
    - a photo of sks backpack in a room
  class_prompts:
    - a photo of a backpack
    - a backpack on a wooden table
