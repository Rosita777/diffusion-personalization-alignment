model_id: data/cache/modelscope/AI-ModelScope/stable-diffusion-v1-5
output_dir: experiments/stage2a_lf_late/smoke_vase_dog
resolution: 512

subjects:
  - subject_id: vase
    class_name: vase
    instance_prompt: a photo of sks vase
    class_prompt: a photo of a vase
    image_paths:
      - data/cache/off_prior_measurement_v0/dreambooth_dataset/dataset/vase/00.jpg
      - data/cache/off_prior_measurement_v0/dreambooth_dataset/dataset/vase/01.jpg
      - data/cache/off_prior_measurement_v0/dreambooth_dataset/dataset/vase/02.jpg
  - subject_id: dog
    class_name: dog
    instance_prompt: a photo of sks dog
    class_prompt: a photo of a dog
    image_paths:
      - data/cache/off_prior_measurement_v0/dreambooth_dataset/dataset/dog/00.jpg
      - data/cache/off_prior_measurement_v0/dreambooth_dataset/dataset/dog/01.jpg
      - data/cache/off_prior_measurement_v0/dreambooth_dataset/dataset/dog/02.jpg

training:
  condition: dadt_lf_late
  max_train_steps: 200
  learning_rate: 0.0001
  lora_rank: 4
  seed: 0
  train_batch_size: 1

alignment:
  alpha: 0.5
  late_timestep_threshold: 800
  low_radius: 2
  mid_radius: 4

evaluation:
  num_images_per_prompt: 2
  prompts:
    - a photo of sks vase on a wooden table
    - a photo of sks vase in a room
    - a photo of sks dog
    - a photo of sks dog in a park
  class_prompts:
    - a photo of a vase
    - a vase on a wooden table
    - a photo of a dog
    - a dog in a park
